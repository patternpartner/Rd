<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>substrate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#020204;color:#9ab;font:11px/1.5 monospace;touch-action:manipulation}
canvas{position:fixed;inset:0}
#stats{position:fixed;top:8px;left:8px;color:rgba(150,170,190,0.55);z-index:2;pointer-events:none;letter-spacing:0.04em;line-height:1.65}
#src{position:fixed;bottom:50px;left:8px;right:8px;color:rgba(140,180,200,0.5);font-size:10px;line-height:1.45;max-height:32vh;overflow:hidden;z-index:2;pointer-events:none;word-break:break-all;white-space:pre-wrap}
#ctrl{position:fixed;bottom:8px;right:8px;display:flex;gap:6px;z-index:3}
#ctrl button{background:rgba(30,40,50,0.7);color:#8af;border:1px solid rgba(100,140,180,0.3);font:10px monospace;padding:6px 10px;border-radius:3px;cursor:pointer;touch-action:manipulation}
#ctrl button:active{background:rgba(50,70,90,0.7)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="stats"></div>
<div id="src"></div>
<div id="ctrl">
  <button id="pause">⏸</button>
  <button id="reset">↺</button>
</div>
<script>
// ═══════════════════════════════════════
// SUBSTRATE
// A loop holding a source string. The string is eval'd as a function
// (no args). Calling it produces a string. That string, mutated, becomes
// the next generation's source.
//
// Selection criterion: did it run and return a string. Nothing else.
// No fitness function. No particles. No designer-imposed grammar except
// what JS itself enforces. Whatever evolves is what stayed alive under
// those rules.
//
// Seed is a quine — a function returning its own source. The lineage
// starts at the quine attractor; mutations explore locally; most kill
// the lineage; rare ones don't, and the survivor drifts somewhere new.
//
// What's the host doing? Holding the loop. Reading the clock. Mutating
// strings. Drawing dots. Nothing about particles, fitness, semantics.
// All of that is for the system to invent or not.
//
// Risk note: a mutation could in principle introduce an infinite loop.
// Browsers' slow-script timeout will offer to kill it after a few
// seconds; failing that, refresh. The architectural commitment is no
// designer restrictions on the grammar, so loops are not pre-blocked.
// ═══════════════════════════════════════

const SEED = "(function s(){return '('+s.toString()+')'})";

let S = SEED;
let gen = 0;
let totalSurvivors = 0;
let lineageDeaths = 0;
let lineageLength = 0;
let bestLineage = 0;
let consecFails = 0;
const MAX_FAILS_BEFORE_RESET = 2000;

const ALPHABET = "()=>'\"`{}[]+-*/.,;:?!|& abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_$\\";

function mutate(s){
  if (!s) return ALPHABET[(Math.random()*ALPHABET.length)|0];
  const op = Math.random();
  const i = (Math.random() * s.length) | 0;
  if (op < 0.4) {
    // substitute
    return s.slice(0,i) + ALPHABET[(Math.random()*ALPHABET.length)|0] + s.slice(i+1);
  } else if (op < 0.7) {
    // insert
    return s.slice(0,i) + ALPHABET[(Math.random()*ALPHABET.length)|0] + s.slice(i);
  } else {
    // delete
    if (s.length <= 1) return s;
    return s.slice(0,i) + s.slice(i+1);
  }
}

function viable(s){
  try {
    if (!s || s.length === 0 || s.length > 8000) return null;
    const f = (new Function('"use strict";return (' + s + ')'))();
    if (typeof f !== 'function') return null;
    const r = f();
    if (typeof r !== 'string') return null;
    if (r.length > 8000) return null;
    return r;
  } catch (e) {
    return null;
  }
}

const survivors = [];
const MAX_SURVIVORS = 400;

function hashStr(s){
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h*33) ^ s.charCodeAt(i)) | 0;
  return h;
}

const c = document.getElementById('c'), X = c.getContext('2d');
const statsEl = document.getElementById('stats'), srcEl = document.getElementById('src');
let W, H;
function resize(){
  W = c.width = innerWidth;
  H = c.height = innerHeight;
  X.fillStyle = '#020204';
  X.fillRect(0,0,W,H);
}
resize();
addEventListener('resize', resize);

let running = true;

function step(){
  gen++;

  const out = viable(S);
  if (!out) {
    consecFails++;
    if (consecFails > MAX_FAILS_BEFORE_RESET) {
      lineageDeaths++;
      if (lineageLength > bestLineage) bestLineage = lineageLength;
      lineageLength = 0;
      S = SEED;
      consecFails = 0;
    }
    return;
  }

  // Mutate S's output. The mutant is the next-gen candidate.
  const child = mutate(out);
  const childOut = viable(child);

  if (childOut !== null) {
    S = child;
    totalSurvivors++;
    lineageLength++;
    consecFails = 0;
    survivors.push({ src: S.length, out: childOut.length, h: hashStr(S) });
    if (survivors.length > MAX_SURVIVORS) survivors.shift();
  } else {
    // Mutated child died. If unmutated output differs from current S
    // and is itself viable, advance to it (lineage drifts without
    // exploration this generation).
    if (out !== S) {
      const outViable = viable(out);
      if (outViable !== null) {
        S = out;
        lineageLength++;
        consecFails = 0;
        return;
      }
    }
    consecFails++;
  }

  if (consecFails > MAX_FAILS_BEFORE_RESET) {
    lineageDeaths++;
    if (lineageLength > bestLineage) bestLineage = lineageLength;
    lineageLength = 0;
    S = SEED;
    consecFails = 0;
  }
}

function draw(){
  X.fillStyle = 'rgba(2,2,4,0.05)';
  X.fillRect(0,0,W,H);

  for (let i = 0; i < survivors.length; i++) {
    const s = survivors[i];
    const t = i / Math.max(1, survivors.length - 1);
    const x = ((s.h >>> 0) % W);
    const y = ((s.h >>> 16) % H);
    const r = 1 + Math.min(4, s.src / 100);
    X.fillStyle = `hsla(${((s.h % 360) + 360) % 360},65%,${35 + t*45}%,${0.15 + t*0.55})`;
    X.beginPath();
    X.arc(x, y, r, 0, Math.PI*2);
    X.fill();
  }

  statsEl.innerHTML =
    `gen ${gen}<br>` +
    `alive ${lineageLength}<br>` +
    `best ${bestLineage}<br>` +
    `survivors ${totalSurvivors}<br>` +
    `resets ${lineageDeaths}<br>` +
    `S len ${S.length}`;

  const display = S.length > 1000 ? S.slice(0,1000) + '\n…' : S;
  srcEl.textContent = display;
}

function tick(){
  if (running) {
    for (let i = 0; i < 200; i++) step();
  }
  draw();
  requestAnimationFrame(tick);
}

document.getElementById('pause').onclick = () => {
  running = !running;
  document.getElementById('pause').textContent = running ? '⏸' : '▶';
};
document.getElementById('reset').onclick = () => {
  S = SEED;
  gen = 0;
  totalSurvivors = 0;
  lineageDeaths = 0;
  lineageLength = 0;
  bestLineage = 0;
  consecFails = 0;
  survivors.length = 0;
  X.fillStyle = '#020204';
  X.fillRect(0,0,W,H);
};

tick();
</script>
</body>
</html>
