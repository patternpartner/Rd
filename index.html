<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Adaptive RD v6 — Mobile</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; touch-action:none; }
canvas#c { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }

#ui {
  position:fixed; top:8px; left:8px; z-index:10;
  display:flex; flex-direction:column; gap:3px;
  max-width:140px;
}
.sec { font:6px 'Courier New',monospace; color:rgba(255,255,255,0.18);
  letter-spacing:0.2em; text-transform:uppercase; margin-top:5px; }
.b { background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.35); font:7px 'Courier New',monospace;
  padding:3px 6px; cursor:pointer; text-align:left; white-space:nowrap;
  -webkit-tap-highlight-color:transparent; }
.b.on { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.9);
  border-color:rgba(255,255,255,0.3); }
.b.hot { border-color:rgba(255,80,30,0.3); color:rgba(255,110,50,0.5); }

#hud { position:fixed; top:8px; right:8px;
  font:7px 'Courier New',monospace; color:rgba(255,255,255,0.18);
  letter-spacing:0.07em; text-align:right; line-height:2; pointer-events:none; }

#obs {
  position:fixed; bottom:0; left:0; right:0; height:90px;
  background:rgba(0,0,0,0.9); border-top:1px solid rgba(255,255,255,0.06);
  display:flex;
}
#obs canvas { flex:1; min-width:0; }

#obs-toggle {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.08);
  border-bottom:none; color:rgba(255,255,255,0.3);
  font:6px 'Courier New',monospace; letter-spacing:0.12em;
  padding:2px 10px; cursor:pointer; -webkit-tap-highlight-color:transparent;
}

#help { position:fixed; bottom:96px; left:8px;
  font:6px 'Courier New',monospace; color:rgba(255,255,255,0.1);
  line-height:1.7; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="sec">view</div>
  <button class="b on" id="v-chem">chemistry</button>
  <button class="b" id="v-age">stratigraphy</button>
  <button class="b" id="v-stress">seismic stress</button>
  <button class="b" id="v-tension">tension</button>
  <button class="b" id="v-terr">territory</button>

  <div class="sec">events</div>
  <button class="b hot" id="btn-quake">ancient quake</button>
  <button class="b" id="btn-freeze">freeze memory</button>

  <div class="sec"></div>
  <button class="b" id="btn-reset">reset all</button>
  <button class="b" id="btn-reseed">reseed</button>
</div>

<div id="hud">
  adaptive rd v6 · mobile<br>
  <span id="gen-l">gen 0</span><br>
  <span id="q-a" style="color:rgba(255,80,30,0.5)">ancient: 0</span>
</div>

<button id="obs-toggle">▾ observatory</button>
<div id="obs">
  <canvas id="seismo"></canvas>
  <canvas id="agehist"></canvas>
  <canvas id="stresshist"></canvas>
  <canvas id="timeline"></canvas>
</div>

<div id="help">drag: seed V / shift+drag: seed U / doubletap: quake</div>

<script>
// ═══════════════════════════════════════════════════════
// ADAPTIVE RD v6 — CPU VERSION FOR MOBILE
//
// Full v5 mechanism set running on CPU:
//   - Per-site Du/Dv drift from chemical history
//   - Memory diffusion + competitive exclusion
//   - Adaptive F/K from geological depth
//   - Boundary fault: damped slip + refractory cooldown
//   - Ancient fault: seismic stress + brittle rupture
//   - Observatory: seismograph, age hist, stress hist, timeline
//
// Grid: adaptive to screen size, ~120x80 cells
// Each cell stores: U, V, Du, Dv, tension, cooldown,
//                   U_avg, V_avg, age, stress
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, GW, GH, tick = 0, frozen = false, view = 'chem';
let qAncient = 0;
const CELL = 5; // pixels per cell

// Simulation arrays (flat, row-major)
let U, V, Du, Dv, tension, cooldown, Uavg, Vavg, age, stress;
let imgData, pixels;

// Parameters
const F0 = 0.0545, K0 = 0.062;
const DU_LO = 0.05, DU_HI = 0.35, DV_LO = 0.025, DV_HI = 0.175;
const DU_DEF = 0.2097, DV_DEF = 0.105;
const ALPHA = 0.003;
let pAdapt = 0.0011, pMemD = 0.0014, pExcl = 0.42, pEros = 0.0075;
let pRupt = 0.58, pDamp = 0.60, pRefr = 0.50;
let pStressRate = 0.000012, pStressDiff = 0.002, pBrittle = 0.60;

// Observatory
const SEISMO_LEN = 200;
const seismoT = new Float32Array(SEISMO_LEN);
const seismoS = new Float32Array(SEISMO_LEN);
let seismoIdx = 0;
const AGE_BINS = 32, STRESS_BINS = 32;
let ageDist = new Float32Array(AGE_BINS);
let stressDist = new Float32Array(STRESS_BINS);
let eventLog = [];
let prevTension = 0, prevStress = 0;
let obsOpen = true;

function idx(x, y) { return y * GW + x; }

function initArrays() {
  const n = GW * GH;
  U = new Float32Array(n); V = new Float32Array(n);
  Du = new Float32Array(n); Dv = new Float32Array(n);
  tension = new Float32Array(n); cooldown = new Float32Array(n);
  Uavg = new Float32Array(n); Vavg = new Float32Array(n);
  age = new Float32Array(n); stress = new Float32Array(n);
  // Defaults
  U.fill(1.0);
  for (let i = 0; i < n; i++) { Du[i] = DU_DEF; Dv[i] = DV_DEF; Uavg[i] = 1.0; }
  imgData = ctx.createImageData(GW, GH);
  pixels = imgData.data;
}

function seed() {
  const n = GW * GH;
  U.fill(1.0); V.fill(0.0);
  const ns = Math.floor(n * 0.003);
  for (let s = 0; s < ns; s++) {
    const cx = 2 + Math.floor(Math.random() * (GW - 4));
    const cy = 2 + Math.floor(Math.random() * (GH - 4));
    const r = 1 + Math.floor(Math.random() * 3);
    for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
      if (dx*dx+dy*dy > r*r) continue;
      const x = (cx+dx+GW)%GW, y = (cy+dy+GH)%GH;
      const i = idx(x,y);
      U[i] = 0.5; V[i] = 0.9;
    }
  }
  tick = 0;
}

function resetMemory() {
  const n = GW * GH;
  Du.fill(DU_DEF); Dv.fill(DV_DEF);
  tension.fill(0); cooldown.fill(0);
  Uavg.fill(1.0); Vavg.fill(0.0);
  age.fill(0); stress.fill(0);
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight - (obsOpen ? 90 : 0);
  GW = Math.floor(W / CELL);
  GH = Math.floor(H / CELL);
  initArrays();
  seed();
  resizeObs();
}

// ── SIMULATION STEP ──
function step() {
  const newU = new Float32Array(GW * GH);
  const newV = new Float32Array(GW * GH);
  const newDu = new Float32Array(GW * GH);
  const newDv = new Float32Array(GW * GH);
  const newTension = new Float32Array(GW * GH);
  const newCooldown = new Float32Array(GW * GH);
  const newUavg = new Float32Array(GW * GH);
  const newVavg = new Float32Array(GW * GH);
  const newAge = new Float32Array(GW * GH);
  const newStress = new Float32Array(GW * GH);

  const act = frozen ? 0 : 1;

  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      const i = idx(x, y);
      const xp = (x+1)%GW, xm = (x-1+GW)%GW;
      const yp = (y+1)%GH, ym = (y-1+GH)%GH;

      const c  = i;
      const n  = idx(x, yp), s2 = idx(x, ym);
      const e  = idx(xp, y), w  = idx(xm, y);
      const ne = idx(xp,yp), nw = idx(xm,yp);
      const se = idx(xp,ym), sw = idx(xm,ym);

      // Laplacian (9-point isotropic)
      const lapU = 0.05*(U[ne]+U[nw]+U[se]+U[sw]) + 0.2*(U[n]+U[s2]+U[e]+U[w]) - U[c];
      const lapV = 0.05*(V[ne]+V[nw]+V[se]+V[sw]) + 0.2*(V[n]+V[s2]+V[e]+V[w]) - V[c];

      // Adaptive F/K
      const drift = Math.abs(U[c]-Uavg[c]) + Math.abs(V[c]-Vavg[c]);
      const stab  = 1 - Math.min(1, drift * 6);
      const vC    = Math.max(0, Math.min(1, (Vavg[c]-0.3)*2));
      const uC    = Math.max(0, Math.min(1, (Uavg[c]-0.5)*2));
      const fkw   = 1 - age[c]*0.5;
      const lF    = Math.max(0.02, Math.min(0.08, F0 + 0.006*(uC*0.6-vC*0.8)*stab*fkw));
      const lK    = Math.max(0.045, Math.min(0.075, K0 + 0.004*(drift*3-stab*0.3)*fkw));

      const Ucur = U[c], Vcur = V[c];
      const UVV  = Ucur * Vcur * Vcur;
      const dU   = Du[c]*lapU - UVV + lF*(1-Ucur);
      const dV   = Dv[c]*lapV + UVV - (lF+lK)*Vcur;

      newU[i] = Math.max(0, Math.min(1, Ucur + dU));
      newV[i] = Math.max(0, Math.min(1, Vcur + dV));

      // ── HISTORY + EROSION ──
      const age_res = 1 - age[c]*0.7;
      const erosion = UVV * pEros * act * age_res;
      newUavg[i] = Math.max(0, Math.min(1, (1-erosion) * (Uavg[c]*(1-ALPHA*act) + Ucur*ALPHA*act) + erosion*0.5));
      newVavg[i] = Math.max(0, Math.min(1, (1-erosion*0.6) * (Vavg[c]*(1-ALPHA*act) + Vcur*ALPHA*act)));

      const stability = Math.max(0, 1 - drift*8);
      let nAge = drift > 0.083
        ? age[c] * 0.97
        : age[c] + 0.00004*stability*act;
      nAge = Math.max(0, Math.min(1, nAge - erosion*0.5));
      newAge[i] = nAge;

      // ── SEISMIC STRESS ──
      const vCommit = Math.max(0, Math.min(1, (Vavg[c]-0.1)*2));
      const uCommit = Math.max(0, Math.min(1, (Uavg[c]-0.4)*2));
      const commit  = Math.max(vCommit, uCommit);
      const lock    = age[c]*stability*commit;
      const sBuild  = lock * pStressRate * act;

      const aN = age[idx(x,yp)], aS = age[idx(x,ym)];
      const aE = age[idx(xp,y)], aW = age[idx(xm,y)];
      const sN = stress[idx(x,yp)], sS = stress[idx(x,ym)];
      const sE = stress[idx(xp,y)], sW = stress[idx(xm,y)];
      const wN=0.2+aN*0.8, wS=0.2+aS*0.8, wE=0.2+aE*0.8, wW=0.2+aW*0.8;
      const wSum=wN+wS+wE+wW;
      const nbrS=(sN*wN+sS*wS+sE*wE+sW*wW)/wSum;
      const sDiff=(nbrS-stress[c])*pStressDiff*act;
      newStress[i] = Math.max(0, Math.min(1, stress[c]+sBuild+sDiff-0.0001*act));

      // ── DIFFUSION ADAPTATION ──
      // Memory diffusion (age-weighted neighbors)
      const DuN=Du[idx(x,yp)],DuS=Du[idx(x,ym)],DuE=Du[idx(xp,y)],DuW=Du[idx(xm,y)];
      const DvN=Dv[idx(x,yp)],DvS=Dv[idx(x,ym)],DvE=Dv[idx(xp,y)],DvW=Dv[idx(xm,y)];
      const DuAvg=(DuN*wN+DuS*wS+DuE*wE+DuW*wW)/wSum;
      const DvAvg=(DvN*wN+DvS*wS+DvE*wE+DvW*wW)/wSum;
      let nDu = Du[c] + (DuAvg-Du[c])*pMemD*act;
      let nDv = Dv[c] + (DvAvg-Dv[c])*pMemD*act;

      // Competitive exclusion — normalized (0-1 range)
      const DuNorm = (nDu-DU_LO)/(DU_HI-DU_LO);
      const DvNorm = (nDv-DV_LO)/(DV_HI-DV_LO);
      const vSig = Math.min(1, Vavg[c]*1.5);
      const uSig = Math.min(1, Uavg[c]*1.2);
      let tDv = 0.3 + 0.65*vSig;
      let tDu = 0.7 - 0.55*vSig*pExcl;
      tDu = tDu*0.5 + Math.max(tDu, 0.2+0.7*uSig)*0.5;
      tDv = tDv*0.5 + Math.min(tDv, 0.9-0.8*uSig*pExcl)*0.5;
      const rdrift = Math.abs(DuNorm-tDu)+Math.abs(DvNorm-tDv);
      const df = Math.min(1, rdrift*3);
      tDu = tDu*(1-df*0.4) + 0.5*df*0.4;
      tDv = tDv*(1-df*0.4) + 0.5*df*0.4;
      nDu = DU_LO + Math.max(0,Math.min(1, DuNorm + (tDu-DuNorm)*pAdapt*act)) * (DU_HI-DU_LO);
      nDv = DV_LO + Math.max(0,Math.min(1, DvNorm + (tDv-DvNorm)*pAdapt*act)) * (DV_HI-DV_LO);

      // Boundary tension
      const DuN2=(nDu-DU_LO)/(DU_HI-DU_LO), DvN2=(nDv-DV_LO)/(DV_HI-DV_LO);
      const ageLock = 1 - age[c]*0.65;
      const cdSup = 1 - cooldown[c];
      const contested = (1-Math.abs(DuN2-DvN2))*(1-Math.abs(DuN2+DvN2-1))*Math.max(0.15,Math.min(1,rdrift*4));
      const tN=tension[idx(x,yp)],tS=tension[idx(x,ym)],tE=tension[idx(xp,y)],tW=tension[idx(xm,y)];
      let newT = tension[c]*0.9 + contested*0.1*ageLock*cdSup + (tN+tS+tE+tW)*0.0375*ageLock*cdSup;
      newT = Math.max(0, Math.min(1, newT));

      let cd = cooldown[c];

      // Boundary fault rupture
      if (act && newT > pRupt) {
        const over = Math.min(1, (newT-pRupt)/(1-pRupt));
        const slip = Math.min(0.55, 0.15 + over*0.4) * pDamp;
        nDu = nDu + (DU_DEF-nDu)*slip;
        nDv = nDv + (DV_DEF-nDv)*slip;
        newT *= (1-slip*0.8);
        cd = Math.min(1, cd + pRefr*over);
      }

      // Ancient fault rupture
      const brittleness = age[c]*0.45;
      const effThresh = pBrittle*(1-brittleness);
      if (act && newStress[i] > effThresh && age[c] > 0.4) {
        const over = Math.min(1, (newStress[i]-effThresh)/(1-effThresh));
        const scatter = Math.min(0.9, 0.3+over*0.6);
        const noiseU = 0.45 + Math.random()*0.1;
        const noiseV = 0.45 + Math.random()*0.1;
        nDu = nDu + (DU_LO+(noiseU*(DU_HI-DU_LO))-nDu)*scatter;
        nDv = nDv + (DV_LO+(noiseV*(DV_HI-DV_LO))-nDv)*scatter;
        newStress[i] *= (1-scatter*0.8);
        newT = Math.min(1, newT + scatter*0.7);
        cd = Math.min(1, cd + scatter*0.8);
      }

      cd = Math.max(0, cd - 0.003*act);
      newCooldown[i] = cd;
      newTension[i]  = newT;
      newDu[i] = Math.max(DU_LO, Math.min(DU_HI, nDu));
      newDv[i] = Math.max(DV_LO, Math.min(DV_HI, nDv));
    }
  }

  U.set(newU); V.set(newV);
  Du.set(newDu); Dv.set(newDv);
  tension.set(newTension); cooldown.set(newCooldown);
  Uavg.set(newUavg); Vavg.set(newVavg);
  age.set(newAge); stress.set(newStress);
}

// ── RENDER ──
function pal4(t, r0,g0,b0, r1,g1,b1, r2,g2,b2, r3,g3,b3) {
  let r,g,b;
  if (t<0.33) { const f=t/0.33; r=r0+(r1-r0)*f; g=g0+(g1-g0)*f; b=b0+(b1-b0)*f; }
  else if (t<0.66) { const f=(t-0.33)/0.33; r=r1+(r2-r1)*f; g=g1+(g2-g1)*f; b=b1+(b2-b1)*f; }
  else { const f=(t-0.66)/0.34; r=r2+(r3-r2)*f; g=g2+(g3-g2)*f; b=b2+(b3-b2)*f; }
  return [r|0, g|0, b|0];
}

function render() {
  let totalT=0, totalS=0;
  ageDist.fill(0); stressDist.fill(0);
  const n = GW*GH;

  for (let i = 0; i < n; i++) {
    let r, g, b;
    if (view === 'chem') {
      const t = Math.max(0,Math.min(1, 1-(U[i]-V[i])*1.2));
      [r,g,b] = pal4(t, 2,3,10, 10,30,77, 178,209,235, 255,200,82);
      // tension overlay
      const to = Math.max(0, tension[i]*2-0.7);
      r = r+(255-r)*to*0.18|0; g = g+(90-g)*to*0.18|0; b = b+(20-b)*to*0.18|0;
    } else if (view === 'age') {
      const a = age[i];
      if (a<0.25) { const f=a/0.25; r=31+(160-31)*f|0; g=209+(107-209)*f|0; b=158+(26-158)*f|0; }
      else if (a<0.6) { const f=(a-0.25)/0.35; r=160+(71-160)*f|0; g=107+(18-107)*f|0; b=26+(8-26)*f|0; }
      else { const f=(a-0.6)/0.4; r=71+(18-71)*f|0; g=18+(5-18)*f|0; b=8+(3-8)*f|0; }
      // stress glow
      const sg = Math.max(0, stress[i]*age[i]*3-0.5);
      r=Math.min(255,r+(200-r)*sg*0.25)|0;
    } else if (view === 'stress') {
      const s = stress[i]*age[i];
      [r,g,b] = pal4(Math.min(1,s*2), 5,3,10, 89,5,64, 230,36,10, 255,242,150);
      // cooldown flash
      const cf = cooldown[i];
      r=Math.min(255,r+(255-r)*cf*0.5)|0; g=Math.min(255,g+(230-g)*cf*0.5)|0; b=Math.min(255,b+(179-b)*cf*0.5)|0;
    } else if (view === 'tension') {
      [r,g,b] = pal4(Math.min(1,tension[i]*1.5), 3,1,5, 77,5,46, 217,36,10, 255,230,153);
      const cf = cooldown[i];
      r=Math.min(255,r+(13-r)*cf*0.5)|0; g=Math.min(255,g+(20-g)*cf*0.5)|0; b=Math.min(255,b+(64-b)*cf*0.5)|0;
    } else { // territory
      const DuN=(Du[i]-DU_LO)/(DU_HI-DU_LO);
      const DvN=(Dv[i]-DV_LO)/(DV_HI-DV_LO);
      const vD=Math.max(0,Math.min(1,(DvN-DuN+0.3)*2));
      const uD=Math.max(0,Math.min(1,(DuN-DvN+0.3)*2));
      const depth=1-age[i]*0.4;
      r=(20*depth*uD + 153*depth*vD)|0;
      g=(38*depth*uD + 46*depth*vD)|0;
      b=(128*depth*uD + 13*depth*vD)|0;
      // contested glow
      const cont=Math.min(1,tension[i]*8)*Math.max(0,1-Math.abs(DuN-DvN)*4);
      r=Math.min(255,r+(242-r)*cont*cont)|0;
      g=Math.min(255,g+(230-g)*cont*cont)|0;
      b=Math.min(255,b+(217-b)*cont*cont)|0;
    }
    pixels[i*4]   = r;
    pixels[i*4+1] = g;
    pixels[i*4+2] = b;
    pixels[i*4+3] = 255;

    totalT += tension[i];
    totalS += stress[i];
    const ab=Math.min(AGE_BINS-1,age[i]*AGE_BINS|0);
    const sb=Math.min(STRESS_BINS-1,stress[i]*STRESS_BINS|0);
    ageDist[ab]++;
    stressDist[sb]++;
  }

  // Scale and blit
  ctx.putImageData(imgData, 0, 0);
  // Scale up to fill screen
  ctx.drawImage(canvas, 0, 0, GW, GH, 0, 0, W, H);

  // Observatory data
  const avgT = totalT/n, avgS = totalS/n;
  seismoT[seismoIdx] = avgT;
  seismoS[seismoIdx] = avgS;
  seismoIdx = (seismoIdx+1)%SEISMO_LEN;

  const deltaT = avgT-prevTension, deltaS = avgS-prevStress;
  if (deltaT > 0.012) eventLog.push({tick, type:'boundary', mag:Math.min(1,deltaT*20)});
  if (deltaS < -0.008 && prevStress > 0.04) eventLog.push({tick, type:'ancient', mag:Math.min(1,Math.abs(deltaS)*15)});
  if (eventLog.length > 400) eventLog.shift();
  prevTension=avgT; prevStress=avgS;
}

// ── OBSERVATORY RENDERING ──
function resizeObs() {
  const h = 90;
  const w = Math.floor(window.innerWidth/4);
  [seismoCanvas,ageCanvas,stressCanvas,timeCanvas].forEach(c=>{c.width=w;c.height=h;});
}

function drawObs() {
  if (!obsOpen) return;
  drawSeismo(); drawAgeHist(); drawStressHist(); drawTimeline();
}

function drawSeismo() {
  const c=seismoCanvas.getContext('2d'), w=c.canvas.width, h=c.canvas.height;
  c.fillStyle='rgba(0,0,0,0.95)'; c.fillRect(0,0,w,h);
  c.fillStyle='rgba(255,255,255,0.1)'; c.font='6px Courier New'; c.fillText('SEISMO',3,8);
  const bw=w/SEISMO_LEN;
  c.beginPath(); c.strokeStyle='rgba(255,160,60,0.6)'; c.lineWidth=1;
  for(let i=0;i<SEISMO_LEN;i++){const di=(seismoIdx+i)%SEISMO_LEN;const x=i*bw;const y=h-6-seismoT[di]*(h-12);if(i===0)c.moveTo(x,y);else c.lineTo(x,y);}c.stroke();
  c.beginPath(); c.strokeStyle='rgba(255,50,30,0.5)'; c.lineWidth=1;
  for(let i=0;i<SEISMO_LEN;i++){const di=(seismoIdx+i)%SEISMO_LEN;const x=i*bw;const y=h-6-seismoS[di]*(h-12);if(i===0)c.moveTo(x,y);else c.lineTo(x,y);}c.stroke();
}

function drawAgeHist() {
  const c=ageCanvas.getContext('2d'), w=c.canvas.width, h=c.canvas.height;
  c.fillStyle='rgba(0,0,0,0.95)'; c.fillRect(0,0,w,h);
  c.fillStyle='rgba(255,255,255,0.1)'; c.font='6px Courier New'; c.fillText('AGE DIST',3,8);
  const mx=Math.max(1,...ageDist);
  const bw=w/AGE_BINS;
  for(let i=0;i<AGE_BINS;i++){const v=ageDist[i]/mx;const t=i/AGE_BINS;const r=(30+t*200)|0,g=(200-t*170)|0,b=(150-t*130)|0;c.fillStyle=`rgba(${r},${g},${b},0.5)`;c.fillRect(i*bw,h-6-v*(h-12),Math.max(1,bw-1),v*(h-12));}
}

function drawStressHist() {
  const c=stressCanvas.getContext('2d'), w=c.canvas.width, h=c.canvas.height;
  c.fillStyle='rgba(0,0,0,0.95)'; c.fillRect(0,0,w,h);
  c.fillStyle='rgba(255,255,255,0.1)'; c.font='6px Courier New'; c.fillText('STRESS',3,8);
  const mx=Math.max(1,...stressDist);
  const bw=w/STRESS_BINS;
  // Mark brittle threshold
  const tx=pBrittle*w;
  c.strokeStyle='rgba(255,80,30,0.3)'; c.lineWidth=1;
  c.beginPath(); c.moveTo(tx,0); c.lineTo(tx,h); c.stroke();
  for(let i=0;i<STRESS_BINS;i++){const v=stressDist[i]/mx;const t=i/STRESS_BINS;const r=(10+t*200)|0,g=(5+t*20)|0,b=(20-t*10)|0;c.fillStyle=`rgba(${r},${g},${b},0.55)`;c.fillRect(i*bw,h-6-v*(h-12),Math.max(1,bw-1),v*(h-12));}
}

function drawTimeline() {
  const c=timeCanvas.getContext('2d'), w=c.canvas.width, h=c.canvas.height;
  c.fillStyle='rgba(0,0,0,0.95)'; c.fillRect(0,0,w,h);
  c.fillStyle='rgba(255,255,255,0.1)'; c.font='6px Courier New'; c.fillText('EVENTS',3,8);
  if (eventLog.length < 2) return;
  const t0=eventLog[0].tick, t1=Math.max(t0+1,eventLog[eventLog.length-1].tick);
  const span=t1-t0;
  for(const ev of eventLog){
    const x=((ev.tick-t0)/span)*w;
    const ht=(h-10)*ev.mag;
    c.fillStyle=ev.type==='boundary'?`rgba(255,160,60,0.6)`:`rgba(255,50,30,0.7)`;
    c.fillRect(x-0.5,h-5-ht,1.5,ht);
  }
}

// ── INPUT ──
let touching=false, touchShift=false;
let lastTap=0;

function toGrid(cx,cy){
  return [Math.floor(cx/W*GW), Math.floor(cy/H*GH)];
}

function paintAt(cx,cy,isU){
  const [gx,gy]=toGrid(cx,cy);
  const r=Math.max(2,Math.floor(GW*0.04));
  for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){
    if(dx*dx+dy*dy>r*r) continue;
    const x=(gx+dx+GW)%GW, y=(gy+dy+GH)%GH;
    const i=idx(x,y);
    if(isU){U[i]=Math.min(1,U[i]+0.5);V[i]=Math.max(0,V[i]-0.3);}
    else{V[i]=Math.min(1,V[i]+0.7);U[i]=Math.max(0,U[i]-0.2);}
  }
}

function quakeAt(cx,cy){
  const [gx,gy]=toGrid(cx,cy);
  const r=Math.max(3,Math.floor(GW*0.12));
  for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){
    if(dx*dx+dy*dy>r*r) continue;
    const x=(gx+dx+GW)%GW, y=(gy+dy+GH)%GH;
    const i=idx(x,y);
    const str=1-Math.sqrt(dx*dx+dy*dy)/r;
    stress[i]=Math.min(1,stress[i]+str*0.9);
    age[i]=Math.min(1,age[i]+str*0.5);
  }
  qAncient++;
  document.getElementById('q-a').textContent='ancient: '+qAncient;
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); touching=true;
  const now=Date.now();
  if(now-lastTap<300){quakeAt(e.touches[0].clientX,e.touches[0].clientY);}
  lastTap=now;
  paintAt(e.touches[0].clientX,e.touches[0].clientY,false);
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();touching=false;},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touching) paintAt(e.touches[0].clientX,e.touches[0].clientY,false);
},{passive:false});
canvas.addEventListener('mousedown',e=>{touching=true;paintAt(e.clientX,e.clientY,e.shiftKey);});
canvas.addEventListener('mouseup',()=>touching=false);
canvas.addEventListener('mousemove',e=>{if(touching)paintAt(e.clientX,e.clientY,e.shiftKey);});
canvas.addEventListener('dblclick',e=>quakeAt(e.clientX,e.clientY));

// ── UI ──
const viewBtns={'v-chem':'chem','v-age':'age','v-stress':'stress','v-tension':'tension','v-terr':'terr'};
Object.entries(viewBtns).forEach(([id,mode])=>{
  document.getElementById(id).onclick=()=>{
    view=mode;
    Object.keys(viewBtns).forEach(bid=>document.getElementById(bid).classList.toggle('on',bid===id));
  };
});

const fBtn=document.getElementById('btn-freeze');
fBtn.onclick=()=>{frozen=!frozen;fBtn.textContent=frozen?'unfreeze':'freeze memory';fBtn.classList.toggle('on',frozen);};
document.getElementById('btn-quake').onclick=()=>quakeAt(GW*CELL/2,GH*CELL/2);
document.getElementById('btn-reset').onclick=()=>{seed();resetMemory();qAncient=0;document.getElementById('q-a').textContent='ancient: 0';eventLog=[];};
document.getElementById('btn-reseed').onclick=seed;

const obsEl=document.getElementById('obs');
const obsToggle=document.getElementById('obs-toggle');
obsToggle.onclick=()=>{
  obsOpen=!obsOpen;
  obsEl.style.display=obsOpen?'flex':'none';
  obsToggle.style.bottom=obsOpen?'90px':'0';
  obsToggle.textContent=obsOpen?'▾ observatory':'▴ observatory';
  resize();
};

window.addEventListener('resize',resize);

// ── LOOP ──
// CPU is slower — run fewer steps per frame on mobile
const STEPS = navigator.hardwareConcurrency > 4 ? 3 : 2;

resize();

function loop(){
  for(let i=0;i<STEPS;i++) step();
  tick+=STEPS;

  // Scale-draw: putImageData at grid size then draw scaled
  ctx.putImageData(imgData,0,0);
  // Now we need a temp canvas trick to scale up
  render(); // render writes to imgData at GW×GH

  if(obsOpen && tick%8===0) drawObs();
  document.getElementById('gen-l').textContent='gen '+tick.toLocaleString();
  requestAnimationFrame(loop);
}

loop();
</script>
